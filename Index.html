<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #0078D7;
        }

        p {
            color: #555;
            margin: 20px 0;
        }

        button {
            padding: 12px 24px;
            border: none;
            background: #0078D7;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #005fa3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to the Demo Website</h1>
        <p>This is a simple HTML page for testing Jenkins, Docker, or web server deployments.</p>

        <button onclick="showMessage()">
            Click Me
        </button>

        <p id="message"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                "Hello! Your demo website is working successfully. 🎉";
        }
    </script>

</body>
</html>
